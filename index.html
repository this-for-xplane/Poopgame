<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 좀비 러너: 울트라 화력 업그레이드</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #ui-container {
            position: absolute; top: 20px; left: 20px; color: white; pointer-events: none;
            text-shadow: 2px 2px 6px rgba(0,0,0,1); z-index: 10;
        }
        .stat-item { font-size: 24px; margin-bottom: 8px; font-weight: 900; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); color: #ff3333; 
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; cursor: pointer;
        }
        #overlay h1 { font-size: 80px; margin: 0; text-transform: uppercase; letter-spacing: 5px; }
        #overlay p { font-size: 24px; color: white; margin-top: 20px; font-weight: bold; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="stat-item" style="color: #58ccff;">SOLDIERS: <span id="soldier-count">1</span></div>
        <div class="stat-item" style="color: #ffcc00;">TOTAL ATK: <span id="total-atk">10</span></div>
        <div class="stat-item">DISTANCE: <span id="dist-val">0</span>m</div>
    </div>

    <div id="overlay" onclick="restart()">
        <h1>GAME OVER</h1>
        <p>클릭하여 다시 시작 (또는 SPACE 키)</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer;
        let playerGroup, road;
        let soldiers = 1;
        let baseAtk = 10;
        let playerSize = 1;
        
        let objects = []; 
        let bullets = [];
        let gameDistance = 0;
        let isGameOver = false;
        let frameCount = 0;
        let targetX = 0;
        let keyState = {};

        const RUN_SPEED = 0.28; 
        const ROAD_WIDTH = 12; 
        const SPAWN_INTERVAL = 90; // 약간 더 자주 생성

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020208);
            scene.fog = new THREE.Fog(0x020208, 50, 200);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 16, 28); // 시야를 더 확보하기 위해 카메라를 뒤로 뺌
            camera.lookAt(0, 0, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio > 2 ? 2 : window.devicePixelRatio); // 성능과 선명도 조절
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(15, 40, 20);
            sunLight.castShadow = true;
            scene.add(sunLight);

            const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, 5000);
            const roadMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            scene.add(road);

            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            updateSoldierModels();

            // 리스너 등록
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', (e) => { 
                keyState[e.code] = true; 
                if(isGameOver && (e.code === 'Space' || e.code === 'Enter')) restart();
            });
            window.addEventListener('keyup', (e) => { keyState[e.code] = false; });
            
            const handleMove = (x) => {
                targetX = (x / window.innerWidth - 0.5) * ROAD_WIDTH * 1.5;
            };
            window.addEventListener('mousemove', (e) => handleMove(e.clientX));
            window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX));

            animate();
        }

        // --- 텍스트 텍스처 (크기 및 외곽선 강화) ---
        function createTextTexture(text, color = "white", isKit = false) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 256;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const fontSize = isKit ? 180 : 150;
            ctx.font = `900 ${fontSize}px Arial Black`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // 검은색 3중 외곽선으로 가독성 보장
            ctx.strokeStyle = "black";
            ctx.lineWidth = 24;
            ctx.strokeText(text, 256, 128);
            ctx.lineWidth = 12;
            ctx.strokeText(text, 256, 128);
            
            ctx.fillStyle = color;
            ctx.fillText(text, 256, 128);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        function updateSoldierModels() {
            while(playerGroup.children.length > 0) playerGroup.remove(playerGroup.children[0]);
            
            const displayLimit = 40; // 모델 렌더링 수 제한 (렉 방지)
            const actualDisplay = Math.min(soldiers, displayLimit);
            const rows = Math.ceil(Math.sqrt(actualDisplay));
            const spacing = 1.1; 

            for(let i=0; i<actualDisplay; i++) {
                const s = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(0.7, 1.4, 0.7),
                    new THREE.MeshPhongMaterial({ color: 0x0088ff })
                );
                body.position.y = 0.7;
                body.castShadow = true;
                s.add(body);

                const r = Math.floor(i / rows);
                const c = i % rows;
                s.position.set((c - (rows-1)/2) * spacing, 0, r * spacing);
                s.scale.set(playerSize, playerSize, playerSize);
                playerGroup.add(s);
            }

            // 병사 무리 머리 위에 총 숫자 표시 (매우 중요)
            const spriteMat = new THREE.SpriteMaterial({ map: createTextTexture(soldiers, "#ffffff") });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.y = 6;
            sprite.scale.set(8, 4, 1);
            playerGroup.add(sprite);
        }

        function spawnObject() {
            const zPos = -180;
            const roll = Math.random();

            if (roll < 0.25) { // 업그레이드 키트
                const group = new THREE.Group();
                const geo = new THREE.BoxGeometry(5, 5, 5);
                const mat = new THREE.MeshPhongMaterial({ color: 0xffaa00, emissive: 0x221100 });
                const kit = new THREE.Mesh(geo, mat);
                kit.castShadow = true;
                group.add(kit);

                // 현재 공격력에 비례한 높은 체력
                const hp = Math.floor(baseAtk * soldiers * 4.5);
                const reward = ['SIZE', 'ATK', 'RATE'][Math.floor(Math.random() * 3)];
                
                const spriteMat = new THREE.SpriteMaterial({ map: createTextTexture(hp, "#ffff00", true) });
                const sprite = new THREE.Sprite(spriteMat);
                sprite.position.y = 6; // 키트 머리 위로 위치
                sprite.scale.set(12, 6, 1);
                group.add(sprite);

                group.position.set(Math.random() * 8 - 4, 2.5, zPos);
                group.userData = { type: 'KIT', hp: hp, maxHp: hp, reward: reward, textSprite: sprite };
                scene.add(group);
                objects.push(group);
            } 
            else if (roll < 0.65) { // 게이트
                const isGood = Math.random() > 0.35;
                createGate(isGood, -3.8, zPos);
                createGate(!isGood, 3.8, zPos);
            } 
            else { // 좀비 부대
                for(let i=0; i<8; i++) {
                    const zombie = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2, 2.2, 1.2),
                        new THREE.MeshPhongMaterial({ color: 0x27ae60 })
                    );
                    zombie.position.set(Math.random() * 10 - 5, 1.1, zPos - (i * 4));
                    zombie.userData = { type: 'ZOMBIE', hp: (baseAtk * soldiers * 0.15) + 150 };
                    scene.add(zombie);
                    objects.push(zombie);
                }
            }
        }

        function createGate(isGood, x, z) {
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(6.5, 9, 0.4);
            const mat = new THREE.MeshPhongMaterial({ 
                color: isGood ? 0x00aaff : 0xff4444, 
                transparent: true, opacity: 0.85 
            });
            const frame = new THREE.Mesh(geo, mat);
            group.add(frame);

            const type = isGood ? (Math.random() > 0.5 ? 'x' : '+') : '-';
            const val = type === 'x' ? 2 : (type === '+' ? 30 : 20);
            
            const txtMat = new THREE.SpriteMaterial({ map: createTextTexture(`${type}${val}`, "white") });
            const sprite = new THREE.Sprite(txtMat);
            sprite.scale.set(10, 5, 1);
            group.add(sprite);

            group.position.set(x, 4.5, z);
            group.userData = { type: 'GATE', gType: type, val: val, passed: false };
            scene.add(group);
            objects.push(group);
        }

        function shoot() {
            // 공격력 공식: 병사 수가 많아질수록 총알 개수와 위력 가속
            const bulletLines = Math.min(Math.floor(Math.sqrt(soldiers)) + 2, 16);
            for(let i=0; i<bulletLines; i++) {
                const b = new THREE.Mesh(
                    new THREE.SphereGeometry(0.35 * playerSize, 8, 8),
                    new THREE.MeshBasicMaterial({ color: 0xffea00 })
                );
                const offset = (i - (bulletLines-1)/2) * 0.85;
                b.position.set(playerGroup.position.x + offset, 1.8, playerGroup.position.z);
                
                const angle = (i - (bulletLines-1)/2) * 0.04;
                b.userData = { 
                    power: baseAtk * (1 + soldiers * 0.001), // 병사 수 비례 위력 증가 추가!
                    vx: Math.sin(angle) * 1.5,
                    vz: -2.2 
                };
                scene.add(b);
                bullets.push(b);
            }
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            frameCount++;

            // 방향키/AD 조작
            if (keyState['ArrowLeft'] || keyState['KeyA']) targetX -= 0.4;
            if (keyState['ArrowRight'] || keyState['KeyD']) targetX += 0.4;

            playerGroup.position.x += (targetX - playerGroup.position.x) * 0.15;
            playerGroup.position.x = Math.max(-5.5, Math.min(5.5, playerGroup.position.x));
            
            gameDistance += RUN_SPEED * 0.5;
            document.getElementById('dist-val').innerText = Math.floor(gameDistance);

            const dynamicFireRate = Math.max(2, 10 - Math.floor(soldiers / 200));
            if (frameCount % dynamicFireRate === 0) shoot();
            if (frameCount % SPAWN_INTERVAL === 0) spawnObject();

            // 총알 업데이트
            for(let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.x += b.userData.vx;
                b.position.z += b.userData.vz;
                if(b.position.z < -200) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            // 장애물 업데이트
            for(let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                obj.position.z += RUN_SPEED;

                // 총알 충돌 감지
                bullets.forEach((b, bi) => {
                    const hitDist = obj.userData.type === 'KIT' ? 5 : 2.5;
                    if (b.position.distanceTo(obj.position) < hitDist) {
                        if (obj.userData.type === 'KIT' || obj.userData.type === 'ZOMBIE') {
                            obj.userData.hp -= b.userData.power;
                            if (obj.userData.type === 'KIT' && frameCount % 3 === 0) {
                                obj.userData.textSprite.material.map = createTextTexture(Math.max(0, Math.floor(obj.userData.hp)), "#ffff00", true);
                            }
                            scene.remove(b);
                            bullets.splice(bi, 1);
                        }
                    }
                });

                if (obj.userData.hp <= 0) {
                    if (obj.userData.type === 'KIT') applyKit(obj.userData.reward);
                    scene.remove(obj);
                    objects.splice(i, 1);
                    continue;
                }

                // 플레이어 충돌 감지
                if (Math.abs(obj.position.z - playerGroup.position.z) < 2.5) {
                    if (obj.userData.type === 'GATE' && !obj.userData.passed) {
                        applyGate(obj.userData);
                        obj.userData.passed = true;
                        obj.visible = false;
                    } 
                    else if (obj.userData.type === 'ZOMBIE') {
                        soldiers = Math.max(0, Math.floor(soldiers * 0.75) - 10);
                        scene.remove(obj);
                        objects.splice(i, 1);
                        updateSoldierModels();
                    }
                }

                if (obj.position.z > 50) {
                    scene.remove(obj);
                    objects.splice(i, 1);
                }
            }

            if (soldiers <= 0) gameOver();

            document.getElementById('soldier-count').innerText = soldiers;
            document.getElementById('total-atk').innerText = Math.floor(baseAtk * soldiers * (1 + soldiers * 0.001)).toLocaleString();
            
            renderer.render(scene, camera);
        }

        function applyGate(data) {
            if (data.gType === '+') soldiers += data.val;
            if (data.gType === 'x') soldiers *= data.val;
            if (data.gType === '-') soldiers = Math.max(1, soldiers - data.val);
            updateSoldierModels();
        }

        function applyKit(reward) {
            if (reward === 'SIZE') playerSize += 0.3;
            if (reward === 'ATK') baseAtk *= 1.8;
            if (reward === 'RATE') baseAtk *= 1.4; 
            updateSoldierModels();
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('overlay').style.display = 'flex';
        }

        function restart() {
            location.reload(); 
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
